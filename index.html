<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>avatar.ai</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@400;500;600&display=swap');

:root {
  --bg:           #0c0c0a;
  --sidebar:      #111110;
  --surface:      #181716;
  --surface-hover:#1e1c19;
  --text:         #e8dcc8;
  --muted:        #6b6355;
  --accent:       #c9a84c;
  --border:       rgba(255,255,255,0.06);
  --r:            8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

/* ── Entry ── */
#entry {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px 80px;
  text-align: center;
  gap: 0;
}

.entry-logo {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  color: var(--text);
  margin-bottom: 56px;
}
.entry-logo span { color: var(--accent); }

.entry-headline {
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 600;
  letter-spacing: -2px;
  line-height: 1.0;
  color: var(--text);
  margin-bottom: 10px;
}
.entry-sub {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 48px;
  font-weight: 400;
}

.portrait-strip {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 48px;
}
.strip-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  overflow: hidden;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  transition: border-color 0.15s, transform 0.15s;
}
.strip-avatar:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-3px); }
.strip-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; filter: sepia(15%) brightness(0.8); }

.entry-form { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
.entry-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 11px 14px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  outline: none;
  text-align: center;
  transition: border-color 0.15s;
}
.entry-input::placeholder { color: var(--muted); }
.entry-input:focus { border-color: rgba(255,255,255,0.14); }
.entry-error { font-size: 12px; color: #b3463f; min-height: 16px; }
.entry-btn {
  background: var(--accent);
  color: #0c0c0a;
  border: none;
  border-radius: var(--r);
  padding: 11px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}
.entry-btn:hover { opacity: 0.88; }
.entry-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.entry-note { font-size: 11px; color: var(--muted); margin-top: 20px; opacity: 0.6; }

/* ── App shell ── */
#app {
  display: none;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.sidebar-logo {
  padding: 20px 16px 16px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  color: var(--text);
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo span { color: var(--accent); }
.sidebar-figures {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  scrollbar-width: none;
}
.sidebar-figures::-webkit-scrollbar { display: none; }

.fig-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--r);
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.fig-item:hover { background: var(--surface-hover); }
.fig-item.active { background: var(--surface); }
.fig-item.locked { opacity: 0.3; cursor: default; pointer-events: none; }

.fig-portrait {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  border: 1.5px solid var(--border);
  transition: border-color 0.12s;
}
.fig-portrait img { width: 100%; height: 100%; object-fit: cover; object-position: top center; filter: sepia(15%) brightness(0.8); }
.fig-item.active .fig-portrait { border-color: var(--accent); }
.fig-item.active .fig-portrait img { filter: sepia(10%) brightness(0.9); }

.fig-name {
  font-family: 'Cinzel', serif;
  font-size: 11.5px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.12s;
}
.fig-item.active .fig-name { color: var(--text); }

/* Main content */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  min-width: 0;
}

/* Empty state */
#empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  gap: 6px;
}
.empty-title { font-size: 14px; color: var(--muted); }
.empty-sub { font-size: 12px; opacity: 0.6; }

/* Conversation */
#convo {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.convo-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#avatarMedia { position: relative; width: 34px; height: 34px; flex-shrink: 0; }
#avatarMedia img, #avatarMedia video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: top center;
  border-radius: 50%; border: 1.5px solid var(--border);
}
#avatarMedia img { filter: sepia(15%) brightness(0.85); z-index: 1; }
#avatarMedia video { z-index: 2; display: none; background: #000; border-radius: 50%; }
#avatarMedia.speaking img { opacity: 0; }
#avatarMedia.speaking video { display: block; }
.rendering-ring {
  position: absolute; inset: -3px; border-radius: 50%;
  border: 1.5px solid transparent; border-top-color: var(--accent);
  animation: spin 0.9s linear infinite; display: none; z-index: 3;
}
#avatarMedia.rendering .rendering-ring { display: block; }

.convo-info { flex: 1; min-width: 0; }
.convo-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.convo-meta { font-size: 11px; color: var(--muted); }
.convo-status { font-size: 12px; color: #b3463f; white-space: nowrap; flex-shrink: 0; }

/* Messages */
.messages {
  flex: 1; overflow-y: auto; padding: 24px 20px;
  display: flex; flex-direction: column; gap: 18px;
  scrollbar-width: thin; scrollbar-color: var(--surface) transparent;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

.msg { display: flex; flex-direction: column; gap: 4px; max-width: 620px; }
.msg.guest { align-self: flex-start; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg-label { font-size: 10px; color: var(--muted); letter-spacing: 0.4px; padding: 0 4px; }
.msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
}
.msg.user .msg-bubble { background: var(--surface-hover); color: var(--muted); }
.msg.guest .msg-bubble { border-radius: 3px var(--r) var(--r) var(--r); }
.msg.user .msg-bubble { border-radius: var(--r) 3px var(--r) var(--r); }

/* Thinking */
.thinking { display: none; padding: 2px 20px 10px; align-items: center; gap: 6px; }
.thinking.active { display: flex; }
.thinking-label { font-size: 12px; color: var(--muted); }
.dots span { display: inline-block; width: 3px; height: 3px; border-radius: 50%; background: var(--muted); margin: 0 2px; animation: blink 1.2s infinite; opacity: 0; }
.dots span:nth-child(2) { animation-delay: 0.3s; }
.dots span:nth-child(3) { animation-delay: 0.6s; }

/* Input */
.input-area {
  padding: 12px 20px 18px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toggles { display: flex; gap: 6px; }
.tog {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 99px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 12px; color: var(--muted); cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  user-select: none;
}
.tog input { display: none; }
.tog:has(input:checked) { background: rgba(201,168,76,0.1); border-color: var(--accent); color: var(--accent); }
.tog.off { opacity: 0.35; pointer-events: none; }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.txt {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 13px;
  font-family: inherit; font-size: 14px; color: var(--text);
  resize: none; outline: none; min-height: 40px; max-height: 120px; line-height: 1.5;
  transition: border-color 0.15s;
}
.txt::placeholder { color: var(--muted); }
.txt:focus { border-color: rgba(255,255,255,0.12); }
.mic-btn {
  width: 40px; height: 40px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s;
  flex-shrink: 0;
}
.mic-btn:hover { background: var(--surface-hover); color: var(--text); }
.mic-btn.recording { background: rgba(179,70,63,0.1); border-color: #b3463f; color: #b3463f; animation: micpulse 1.2s infinite; }
.send-btn {
  height: 40px; padding: 0 18px; background: var(--accent); color: #0c0c0a;
  border: none; border-radius: var(--r); font-family: inherit; font-size: 13px;
  font-weight: 500; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s;
}
.send-btn:hover { opacity: 0.88; }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.input-hint { font-size: 11px; color: var(--muted); text-align: center; opacity: 0.5; }

/* Animations */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
@keyframes micpulse { 0%,100%{box-shadow:0 0 0 0 rgba(179,70,63,0.3)} 50%{box-shadow:0 0 0 5px rgba(179,70,63,0)} }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>

<!-- Entry screen -->
<div id="entry">
  <div class="entry-logo">avatar<span>.ai</span></div>
  <h1 class="entry-headline">Talk to history.</h1>
  <p class="entry-sub">Conversations grounded in primary sources.</p>
  <div class="portrait-strip" id="entryStrip">
    <div class="strip-avatar"><img src="images/Washington.jpg" alt="Washington"></div>
    <div class="strip-avatar"><img src="images/JahsehOnfroy.jpg" alt="Jahseh"></div>
    <div class="strip-avatar"><img src="images/SigmundFreud.jpg" alt="Freud"></div>
    <div class="strip-avatar"><img src="images/NiccoloMachiavelli.jpg" alt="Machiavelli"></div>
    <div class="strip-avatar"><img src="images/KingDavid.jpg" alt="David"></div>
    <div class="strip-avatar"><img src="images/KingSolomon.jpg" alt="Solomon"></div>
    <div class="strip-avatar"><img src="images/Cleopatra.jpg" alt="Cleopatra"></div>
    <div class="strip-avatar"><img src="images/AbrahamLincoln.jpg" alt="Lincoln"></div>
    <div class="strip-avatar"><img src="images/JaneAusten.jpg" alt="Austen"></div>
  </div>
  <div class="entry-form">
    <input class="entry-input" type="password" id="codeInput" placeholder="Access code" autocomplete="off">
    <div class="entry-error" id="entryError"></div>
    <button class="entry-btn" id="enterBtn">Enter</button>
  </div>
  <div class="entry-note">By invitation only</div>
</div>

<!-- App -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">avatar<span>.ai</span></div>
    <div class="sidebar-figures" id="figureList"></div>
  </aside>
  <div class="main">
    <div id="empty">
      <div class="empty-title">Select a figure</div>
      <div class="empty-sub">to begin a conversation</div>
    </div>
    <div id="convo">
      <div class="convo-header">
        <div id="avatarMedia">
          <div class="rendering-ring"></div>
          <img id="guestPortrait" src="" alt="">
          <video id="guestVideo" playsinline></video>
        </div>
        <div class="convo-info">
          <div class="convo-name" id="guestName"></div>
          <div class="convo-meta" id="guestMeta"></div>
        </div>
        <div class="convo-status" id="convoStatus"></div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="thinking" id="thinking">
        <span class="thinking-label" id="thinkingLabel">Thinking</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="input-area">
        <div class="toggles">
          <label class="tog"><input type="checkbox" id="voiceToggle" checked><span>Voice</span></label>
          <label class="tog"><input type="checkbox" id="videoToggle" checked><span>Talking head</span></label>
          <label class="tog"><input type="checkbox" id="textOnlyToggle"><span>Text only</span></label>
        </div>
        <div class="input-row">
          <textarea class="txt" id="textInput" placeholder="Ask something…" rows="1"></textarea>
          <button class="mic-btn" id="micBtn" title="Record">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
        <div class="input-hint">Shift+Enter for new line</div>
      </div>
    </div>
  </div>
</div>

<script>
let ACCESS_CODE_VAL = '';
let hasEleven = false;
let AVATARS = [];
let currentAvatar = null;
let chatHistory = [];
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];

const $ = id => document.getElementById(id);

/* ── Entry ── */
$('enterBtn').addEventListener('click', tryEnter);
$('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryEnter(); });

async function tryEnter() {
  const code = $('codeInput').value.trim();
  if (!code) { $('entryError').textContent = 'Enter your access code.'; return; }
  $('enterBtn').disabled = true;
  try {
    const res = await fetch('/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code }) });
    const data = await res.json();
    if (!data.ok) { $('entryError').textContent = 'Invalid code.'; $('enterBtn').disabled = false; return; }
    ACCESS_CODE_VAL = code;
    hasEleven = data.hasEleven;
    enterApp();
  } catch(e) {
    $('entryError').textContent = 'Could not connect.';
    $('enterBtn').disabled = false;
  }
}

async function enterApp() {
  if (!hasEleven) {
    $('voiceToggle').checked = false; $('voiceToggle').disabled = true;
    $('videoToggle').checked = false; $('videoToggle').disabled = true;
    $('textOnlyToggle').checked = true;
    document.querySelectorAll('.tog').forEach((el, i) => { if (i < 2) el.classList.add('off'); });
  }
  $('entry').style.display = 'none';
  $('app').style.display = 'flex';
  const res = await fetch('/avatars', { headers: { 'x-access-code': ACCESS_CODE_VAL } });
  if (res.ok) { AVATARS = await res.json(); buildFigureList(); }
}

/* ── Sidebar ── */
function buildFigureList() {
  const list = $('figureList');
  list.innerHTML = '';
  AVATARS.forEach(a => {
    const locked = false;
    const el = document.createElement('div');
    el.className = 'fig-item' + (locked ? ' locked' : '');
    el.dataset.id = a.id;
    el.innerHTML = `
      <div class="fig-portrait"><img src="${a.portrait}" alt="${a.name}" onerror="this.parentElement.style.background='var(--surface-hover)'"></div>
      <div class="fig-name">${a.name}</div>`;
    if (!locked) el.addEventListener('click', () => openConvo(a));
    list.appendChild(el);
  });
}

/* ── Conversation ── */
function openConvo(avatar) {
  if (currentAvatar?.id === avatar.id) return;
  currentAvatar = avatar;
  chatHistory = [];

  document.querySelectorAll('.fig-item').forEach(el => el.classList.toggle('active', el.dataset.id === avatar.id));

  $('empty').style.display = 'none';
  $('convo').style.display = 'flex';

  $('guestPortrait').src = avatar.portrait;
  $('guestVideo').src = '';
  $('avatarMedia').classList.remove('speaking', 'rendering');
  $('guestName').textContent = avatar.name;
  $('guestMeta').textContent = avatar.years + ' · ' + avatar.location;
  $('convoStatus').textContent = '';
  $('messages').innerHTML = '';
  addMsg('guest', avatar.opening);
  $('textInput').focus();
}

/* ── Toggles ── */
$('voiceToggle').addEventListener('change', () => {
  if (!$('voiceToggle').checked) { $('videoToggle').checked = false; }
});
$('videoToggle').addEventListener('change', () => {
  if ($('videoToggle').checked) { $('voiceToggle').checked = true; }
});
$('textOnlyToggle').addEventListener('change', () => {
  const on = $('textOnlyToggle').checked;
  ['voiceToggle', 'videoToggle'].forEach(id => {
    const el = $(id); el.checked = !on; el.disabled = on;
    el.closest('.tog').classList.toggle('off', on);
  });
});

/* ── Chat ── */
function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'user' : 'guest'}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : currentAvatar.name;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.append(label, bubble);
  $('messages').appendChild(wrap);
  $('messages').scrollTop = $('messages').scrollHeight;
}

async function askGuest(question) {
  if (!currentAvatar) return;
  addMsg('user', question);
  chatHistory.push({ role: 'user', content: question });
  $('sendBtn').disabled = true;
  $('convoStatus').textContent = '';
  $('thinkingLabel').textContent = currentAvatar.useSearch ? 'Searching sources' : 'Thinking';
  $('thinking').classList.add('active');

  const note = chatHistory.length > 2
    ? '\n\n## CONVERSATION AWARENESS\nDo NOT repeat any quote, story, or fact already used. Go deeper, bring something new.'
    : '';

  try {
    const payload = { model: 'claude-sonnet-4-5', max_tokens: 1500, system: currentAvatar.brain + note, messages: chatHistory };
    if (currentAvatar.useSearch) payload.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
    const res = await fetch('/anthropic', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-access-code': ACCESS_CODE_VAL }, body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.error) throw new Error(JSON.stringify(data.error));
    const reply = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
    if (!reply) throw new Error('empty');
    chatHistory.push({ role: 'assistant', content: reply });
    $('thinking').classList.remove('active');
    addMsg('guest', reply);
    if ($('voiceToggle').checked && hasEleven && currentAvatar.voiceId) {
      if ($('videoToggle').checked) await speakWithVideo(reply);
      else await speakAudioOnly(reply);
    }
  } catch(e) {
    $('thinking').classList.remove('active');
    $('convoStatus').textContent = 'Error — try again.';
    addMsg('guest', 'Something interrupted us. Please try again.');
    console.error(e);
  }
  $('sendBtn').disabled = false;
}

async function speakWithVideo(text) {
  const m = $('avatarMedia');
  m.classList.add('rendering');
  $('convoStatus').textContent = 'Rendering…';
  try {
    const res = await fetch(`/elevenlabs/speak/${currentAvatar.voiceId}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'x-access-code': ACCESS_CODE_VAL },
      body: JSON.stringify({ text, imageFile: currentAvatar.portrait, model_id: 'eleven_flash_v2_5', voice_settings: { stability: 0.72, similarity_boost: 0.85 } })
    });
    if (!res.ok) throw new Error('speak failed');
    const type = res.headers.get('content-type') || '';
    const url = URL.createObjectURL(await res.blob());
    m.classList.remove('rendering');
    $('convoStatus').textContent = '';
    if (type.includes('video')) {
      const v = $('guestVideo'); v.src = url; m.classList.add('speaking'); v.play();
      v.onended = () => { m.classList.remove('speaking'); URL.revokeObjectURL(url); };
    } else { const a = new Audio(url); a.play(); a.onended = () => URL.revokeObjectURL(url); }
  } catch(e) {
    m.classList.remove('rendering');
    $('convoStatus').textContent = 'Video unavailable — audio only';
    await speakAudioOnly(text);
  }
}

async function speakAudioOnly(text) {
  try {
    const res = await fetch(`/elevenlabs/tts/${currentAvatar.voiceId}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'x-access-code': ACCESS_CODE_VAL },
      body: JSON.stringify({ text, model_id: 'eleven_flash_v2_5', voice_settings: { stability: 0.72, similarity_boost: 0.85 } })
    });
    if (!res.ok) { $('convoStatus').textContent = 'Voice error'; return; }
    const url = URL.createObjectURL(await res.blob());
    const a = new Audio(url); a.play(); a.onended = () => URL.revokeObjectURL(url);
  } catch(e) { $('convoStatus').textContent = 'Voice error'; }
}

$('sendBtn').addEventListener('click', () => {
  const q = $('textInput').value.trim();
  if (q) { askGuest(q); $('textInput').value = ''; }
});
$('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); const q = $('textInput').value.trim(); if (q) { askGuest(q); $('textInput').value = ''; } }
});

$('micBtn').addEventListener('click', async () => {
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream); audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        if (hasEleven) {
          try {
            const fd = new FormData(); fd.append('audio', blob, 'q.webm'); fd.append('model_id', 'scribe_v1');
            const r = await fetch('/elevenlabs/stt', { method: 'POST', headers: { 'x-access-code': ACCESS_CODE_VAL }, body: fd });
            const d = await r.json();
            if (d.text?.trim()) { askGuest(d.text.trim()); return; }
          } catch(e) { console.error('STT:', e); }
        }
        $('convoStatus').textContent = 'Could not transcribe — type your question.';
      };
      mediaRecorder.start(); isRecording = true; $('micBtn').classList.add('recording');
    } catch(e) { $('convoStatus').textContent = 'Microphone denied.'; }
  } else {
    mediaRecorder.stop(); isRecording = false; $('micBtn').classList.remove('recording');
  }
});
</script>
</body>
</html>
